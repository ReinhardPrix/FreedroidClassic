name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libsdl2-dev \
          libsdl2-gfx-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev

    - name: Bootstrap autotools
      run: ./autogen.sh

    - name: Configure
      run: ./configure

    - name: Build
      run: make -j"$(nproc)"
