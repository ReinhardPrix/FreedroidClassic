name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  arch-build:
    name: arch/${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gcc
            cc: gcc
            make_target: all
          - name: clang-strict
            cc: clang
            make_target: strict
    env:
      CC: ${{ matrix.cc }}

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        pacman -Syu --noconfirm --needed \
          autoconf \
          automake \
          gcc \
          clang \
          libjpeg-turbo \
          libpng \
          libtool \
          libvorbis \
          make \
          pkgconf \
          sdl3 \
          sdl3_image \
          sdl3_mixer

    - name: Bootstrap autotools
      run: ./00boot

    - name: Configure
      run: ./configure

    - name: Build
      run: make -j"$(nproc)" ${{ matrix.make_target }}
